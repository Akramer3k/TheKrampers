<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Krampers Light Show</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Exo 2', sans-serif;
            background-image: url('Background.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

        body::-webkit-scrollbar {
            width: 0; 
        }

        .top-bar {
            background-color: #333;
            color: #fff;
            padding: 15px 0; 
            text-align: center;
            border-radius: 0px 0px 10px 10px; 
        }

        .top-bar a {
            text-decoration: none;
            color: #ccc; 
            margin: 0 15px;
            cursor: pointer; 
        }

        .top-bar a:hover {
            color: #fff; 
        }

        .content {
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            font-size: 24px;
            color: #d6d6d6;
        }

        #countdown {
            font-size: 24px;
            color: #fff;
        }

        .scroll-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 200vh;
        }

        .scroll-image {
            width: 100%;
            height: 100vh;
            background-image: url('image1.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        .scroll-image:nth-child(2n) {
            background-image: url('image2.jpg');
        }

        .footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="#home">Home</a>
        <a href="#christmas">Christmas</a>
        <a href="#halloween">Halloween</a>
        <a href="#parade">Christmas Parade</a>
        <a href="#control-panel">Control Panel</a>
        <a href="#suggest">Suggest</a>
        <a href="#contact">Contact</a>
    </div>

    <div class="content">
        <h1>The Krampers Light Show</h1>
        <p>Light Show Opening: <span id="countdown"></span></p>
    </div>

    <div class="scroll-container">
        <div class="scroll-image"></div>
        <div class="scroll-image"></div>
    </div>

    <!-- Footer with clickable text -->
    <div class="footer" onclick="window.open('https://www.youtube.com/@TheKrampers', '_blank')">
        The Krampers Light Show ©️2023
    </div>

    <script>
        const targetDate = new Date('2023-10-01T22:00:00-05:00');

        function updateCountdown() {
            const currentDate = new Date();
            const timeDifference = targetDate - currentDate;

            if (timeDifference > 0) {
                const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);

                document.getElementById('countdown').innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            } else {
                document.getElementById('countdown').innerHTML = 'Event Ended';
            }
        }

        setInterval(updateCountdown, 1000);

        updateCountdown();
    </script>
</body>
</html>
